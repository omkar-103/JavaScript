<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <!-- <h1>Ecommerce</h1> -->
         <nav>
            <h1>Logo</h1>
            <button>Create Products</button>
         </nav>

       <div class="products">
        <div class="product-card">
           
            <div class="img">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c2hvZXN8ZW58MHx8MHx8fDA%3D" alt="Shoes-Image">
            </div>

            <div class="text">
                <h3>Name</h3>
                <p>Description</p>
                <p>Price</p>
            </div>

            <div class="btns">
                <button id="update">Update</button>
                <button id="delete">Delete</button>
            </div>


        </div>
       </div>


       <div class="forms">
        <form>
            <h1>Create Products</h1>
            <input type="text" placeholder="Enter Proudct Name">
            <input type="text" placeholder="Enter product Description">
            <input type="number" placeholder="Enter Product Price">
            <input type="url" placeholder="Enter Product Image Url">
            <button>Submit</button>
        </form>
       </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
